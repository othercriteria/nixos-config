# snapshot-gitops: safe -- Secret-shaped carrier for a Prometheus scrape config.
# Contents are kubernetes_sd_configs / relabel_configs only; no credentials,
# tokens, or other sensitive material. Safe to mirror into the public
# nixos-config repo via `make snapshot-gitops`.
apiVersion: v1
kind: Secret
metadata:
  name: additional-scrape-configs
  namespace: monitoring
  labels:
    app.kubernetes.io/name: prometheus-additional-scrape-configs
    app.kubernetes.io/part-of: kube-prometheus-stack
type: Opaque
stringData:
  additional-scrape-configs.yaml: |
    - job_name: etcd-from-nodes
      scheme: http
      metrics_path: /metrics
      kubernetes_sd_configs:
        - role: node
      relabel_configs:
        - action: keep
          source_labels: [__meta_kubernetes_node_label_node_role_kubernetes_io_control_plane]
          regex: .+
        - action: replace
          source_labels: [__meta_kubernetes_node_address_InternalIP]
          target_label: __address__
          regex: (.*)
          replacement: $1:2381
        - action: replace
          target_label: job
          replacement: kube-etcd
        - action: replace
          source_labels: [__meta_kubernetes_node_name]
          target_label: instance
          regex: (.*)
          replacement: $1
    - job_name: kube-proxy-from-nodes
      scheme: http
      metrics_path: /metrics
      kubernetes_sd_configs:
        - role: node
      relabel_configs:
        - action: replace
          source_labels: [__meta_kubernetes_node_address_InternalIP]
          target_label: __address__
          regex: (.*)
          replacement: $1:10249
        - action: replace
          target_label: job
          replacement: kube-proxy
        - action: replace
          source_labels: [__meta_kubernetes_node_name]
          target_label: instance
          regex: (.*)
          replacement: $1
    - job_name: kube-controller-manager-from-nodes
      scheme: https
      metrics_path: /metrics
      tls_config:
        insecure_skip_verify: true
      kubernetes_sd_configs:
        - role: node
      relabel_configs:
        - action: keep
          source_labels: [__meta_kubernetes_node_label_node_role_kubernetes_io_control_plane]
          regex: .+
        - action: replace
          source_labels: [__meta_kubernetes_node_address_InternalIP]
          target_label: __address__
          regex: (.*)
          replacement: $1:10257
        - action: replace
          target_label: job
          replacement: kube-controller-manager
        - action: replace
          source_labels: [__meta_kubernetes_node_name]
          target_label: instance
          regex: (.*)
          replacement: $1
    - job_name: kube-scheduler-from-nodes
      scheme: https
      metrics_path: /metrics
      tls_config:
        insecure_skip_verify: true
      kubernetes_sd_configs:
        - role: node
      relabel_configs:
        - action: keep
          source_labels: [__meta_kubernetes_node_label_node_role_kubernetes_io_control_plane]
          regex: .+
        - action: replace
          source_labels: [__meta_kubernetes_node_address_InternalIP]
          target_label: __address__
          regex: (.*)
          replacement: $1:10259
        - action: replace
          target_label: job
          replacement: kube-scheduler
        - action: replace
          source_labels: [__meta_kubernetes_node_name]
          target_label: instance
          regex: (.*)
          replacement: $1
