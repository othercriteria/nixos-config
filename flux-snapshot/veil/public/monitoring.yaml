apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: flux-system
spec:
  interval: 10m
  install:
    createNamespace: true
  targetNamespace: monitoring
  chart:
    spec:
      chart: kube-prometheus-stack
      version: 66.3.0
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system
  values:
    defaultRules:
      create: true
      rules:
        alertmanager: true
        etcd: true
        general: true
        kubeApiserver: true
        kubeControllerManager: true
        kubeScheduler: true
        kubeStateMetrics: true
        kubelet: true
        node: true
        prometheus: true
    kubeEtcd:
      enabled: true
    prometheus:
      prometheusSpec:
        additionalScrapeConfigsSecret:
          enabled: true
          name: additional-scrape-configs
          key: additional-scrape-configs.yaml
      ingress:
        enabled: true
        ingressClassName: nginx
        annotations:
          cert-manager.io/cluster-issuer: "home-ca"
        hosts:
          - prometheus.veil.home.arpa
        paths:
          - /
        pathType: Prefix
        tls:
          - secretName: prometheus-tls
            hosts:
              - prometheus.veil.home.arpa
    grafana:
      service:
        type: ClusterIP
      ingress:
        enabled: true
        ingressClassName: nginx
        annotations:
          cert-manager.io/cluster-issuer: "home-ca"
        hosts:
          - grafana.veil.home.arpa
        path: /
        pathType: Prefix
        tls:
          - secretName: grafana-tls
            hosts:
              - grafana.veil.home.arpa
      sidecar:
        dashboards:
          enabled: true
          label: grafana_dashboard
          searchNamespace: ALL
      dashboards: {}
    alertmanager:
      ingress:
        enabled: true
        ingressClassName: nginx
        annotations:
          cert-manager.io/cluster-issuer: "home-ca"
        hosts:
          - alertmanager.veil.home.arpa
        paths:
          - /
        pathType: Prefix
        tls:
          - secretName: alertmanager-tls
            hosts:
              - alertmanager.veil.home.arpa
      # Mount the SOPS-decrypted ntfy credentials Secret into the
      # Alertmanager pod. Files appear at /etc/alertmanager/secrets/
      # alertmanager-ntfy-credentials/{username,password}. The
      # webhook receiver below references password_file.
      alertmanagerSpec:
        secrets:
          - alertmanager-ntfy-credentials
      # Critical-only routing to skaia's ntfy server. All non-critical
      # alerts (including the synthetic Watchdog heartbeat) fall through
      # to a "null" receiver. We can promote severities later if the
      # signal-to-noise warrants it.
      config:
        global:
          resolve_timeout: 5m
        route:
          receiver: "null"
          group_by: ["alertname", "namespace"]
          group_wait: 30s
          group_interval: 5m
          repeat_interval: 12h
          routes:
            - receiver: "null"
              matchers:
                - alertname="Watchdog"
            - receiver: ntfy-veil-critical
              matchers:
                - severity="critical"
              continue: false
        inhibit_rules:
          - source_matchers:
              - severity="critical"
            target_matchers:
              - severity=~"warning|info"
            equal: ["namespace", "alertname"]
          - source_matchers:
              - severity="warning"
            target_matchers:
              - severity="info"
            equal: ["namespace", "alertname"]
        receivers:
          - name: "null"
          - name: ntfy-veil-critical
            webhook_configs:
              - url: https://ntfy.valueof.info/veil-critical
                send_resolved: true
                http_config:
                  basic_auth:
                    username: veil-alerts
                    password_file: /etc/alertmanager/secrets/alertmanager-ntfy-credentials/password
